name: Build Tauri Client

on:
  push:
    branches:
      - main
    paths:
      - client/**

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    env:
      npm_config_cache: ${{ matrix.platform.name == 'windows' && 'C:\\actions-cache\\roguecord\\npm' || matrix.platform.name == 'linux' && '/var/cache/roguecord/npm' || '' }}
      CARGO_HOME: ${{ matrix.platform.name == 'windows' && 'C:\\actions-cache\\roguecord\\cargo' || matrix.platform.name == 'linux' && '/var/cache/roguecord/cargo' || '' }}
      CARGO_TARGET_DIR: ${{ matrix.platform.name == 'windows' && 'C:\\actions-cache\\roguecord\\target\\windows' || matrix.platform.name == 'linux' && '/var/cache/roguecord/target/linux' || 'client/tauri/target' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows
            runner:
              - self-hosted
              - windows
            artifact_name: tauri-client-windows
            bundle_glob: C:\actions-cache\roguecord\target\windows\release\bundle\**\*.exe
          - name: linux
            runner:
              - self-hosted
              - linux
            artifact_name: tauri-client-linux
            bundle_glob: /var/cache/roguecord/target/linux/release/bundle/**/*
          - name: macos
            runner: macos-latest
            artifact_name: tauri-client-macos
            bundle_glob: client/tauri/target/release/bundle/**/*

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ${{ matrix.platform.name == 'macos' && 'npm' || '' }}
          cache-dependency-path: client/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        if: matrix.platform.name == 'macos'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: client/tauri -> target

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build Tauri client
        working-directory: client
        run: npm run tauri:build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          if-no-files-found: error
          path: |
            ${{ matrix.platform.bundle_glob }}
            !client/tauri/target/release/bundle/**/.cargo-lock
