name: Build Tauri Client

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows
            runner: windows-latest
            artifact_name: tauri-client-windows
            bundle_glob: client/tauri/target/release/bundle/**/*.msi
          - name: linux
            runner: ubuntu-22.04
            artifact_name: tauri-client-linux
            bundle_glob: client/tauri/target/release/bundle/**/*
          - name: macos
            runner: macos-latest
            artifact_name: tauri-client-macos
            bundle_glob: client/tauri/target/release/bundle/**/*

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: client/tauri -> target

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build Tauri client
        working-directory: client
        run: npm run tauri:build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          if-no-files-found: error
          path: |
            ${{ matrix.platform.bundle_glob }}
            !client/tauri/target/release/bundle/**/.cargo-lock
